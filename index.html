<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my rating system</title>
    <style>
      body {
        background-color: #14181c;
        color: #aabbcc;
      }
      .title {
        text-align: center;
      }
      .taste {
        text-align: center;
        font-size: large;
      }
      .table {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!--title-->
    <section class="title">
      <h1>my rating system</h1>
    </section>
    <!-- taste-->
    <section class="taste">
      <p>
        my taste in movies leans toward science-based stories that make me think
        deeply.<br />I like films where the science isn’t just decoration, but
        the core idea behind the plot<br />that give me the feeling there’s
        something huge and hidden.
      </p>
    </section>

    <section class="table">
      <h1>table system</h1>
      <thead>
        <tr>
          <th>rate</th>
          <th>stars</th>
          <th>description</th>
        </tr>
      </thead>
    </section>
  </body>
</html>
