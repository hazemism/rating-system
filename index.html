<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my rating system</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!--image-->
    <img src="assets/image/stars.jpg" class="thumbnail" alt="stars" />
    <!--title-->
    <section class="header">
      <header>
        <h1>my taste in movies</h1>
      </header>
    </section>
    <!-- taste-->
    <section class="taste">
      <p>
        I’m into movies with real science that actually matters to the story.</br>
        Not just there for show. I like stuff that makes me think and feels
        kinda deep,</br>like there’s something bigger going on under the surface.
      </p>
    </section>
    <!-- table-->
    <section class="table">
      <h1>my rating table</h1>
      <thead>
        <tr>
          <th>rate</th>
          <th>stars</th>
          <th>description</th>
        </tr>
      </thead>
    </section>
    <footer>
      <p>inks</p>
    </footer>
  </body>
</html>
